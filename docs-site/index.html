<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Delta-DB API Reference</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/@stoplight/elements/styles.min.css"
    />
    <style>
      :root {
        color-scheme: light;
        --sl-color-canvas-100: #f5f3ef;
        --sl-color-canvas-200: #fdfcf8;
        --sl-color-text: #211d17;
        --sl-color-primary: #0a7c66;
      }

      body {
        margin: 0;
        font-family: "IBM Plex Sans", "Helvetica Neue", Arial, sans-serif;
        background:
          radial-gradient(circle at top left, rgba(10, 124, 102, 0.14), transparent 28%),
          linear-gradient(180deg, #f5f3ef 0%, #fdfcf8 38%, #fffdfa 100%);
        color: #211d17;
      }

      .shell {
        min-height: 100vh;
      }

      .hero {
        max-width: min(1800px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 40px 24px 20px;
      }

      .eyebrow {
        display: inline-block;
        padding: 6px 10px;
        border-radius: 999px;
        background: rgba(10, 124, 102, 0.12);
        color: #0a7c66;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1 {
        margin: 14px 0 8px;
        font-size: clamp(32px, 6vw, 54px);
        line-height: 1;
        letter-spacing: -0.04em;
      }

      .copy {
        max-width: 760px;
        margin: 0;
        font-size: 16px;
        line-height: 1.6;
        color: rgba(33, 29, 23, 0.8);
      }

      .meta {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-top: 18px;
        font-size: 13px;
        color: rgba(33, 29, 23, 0.72);
      }

      .meta code {
        padding: 2px 6px;
        border-radius: 6px;
        background: rgba(33, 29, 23, 0.06);
        font-family: "IBM Plex Mono", "SFMono-Regular", monospace;
      }

      .panel {
        max-width: min(1800px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 0 16px 40px;
      }

      .card {
        overflow: hidden;
        border: 1px solid rgba(33, 29, 23, 0.08);
        border-radius: 24px;
        box-shadow: 0 18px 60px rgba(43, 38, 30, 0.08);
      }

      elements-api {
        min-height: calc(100vh - 220px);
        width: 100%;
      }

      @media (max-width: 900px) {
        .hero {
          max-width: 100%;
          padding: 28px 16px 16px;
        }

        .panel {
          max-width: 100%;
          padding: 0 10px 20px;
        }

        .card {
          border-radius: 16px;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <header class="hero">
        <div class="eyebrow">Delta-DB</div>
        <h1>API Reference</h1>
        <p class="copy">
          OpenAPI is the documentation source of truth. This page is served by the
          backend and rendered with Stoplight Elements for reference browsing and
          interactive requests.
        </p>
        <div class="meta">
          <span>Spec: <code>/openapi.yaml</code></span>
          <span>UI: <code>Stoplight Elements</code></span>
          <span>Audience: <code>Frontend integration</code></span>
        </div>
      </header>

      <main class="panel">
        <div class="card">
          <elements-api
            apiDescriptionUrl="/openapi.yaml"
            router="hash"
            layout="sidebar"
            tryItCredentialsPolicy="same-origin"
          />
        </div>
      </main>
    </div>

    <script src="https://unpkg.com/@stoplight/elements/web-components.min.js"></script>
  </body>
</html>
