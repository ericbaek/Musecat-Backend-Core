  /arcade/game/bulk_version:
    post:
      tags: [Moderator]
      summary: /arcade/game/bulk_version
      description: |
        Requires an authenticated user whose `tag` or `tags` includes `developer`, `moderator`, `supporter`, or `founding_supporter`.
        The selected atoms may span multiple arcades.

        Changelog rules:
        - Create exactly one `arcade_changelog` row per request.
        - Set `changed` to `bulk_game_version`.
        - Set `from` to the shared current game version id.
        - Set `to` to the shared new game version id.
        - Store the detailed snapshot in `log` using `BulkGameVersionChangelogLog`.
        - `log.items[]` must contain one object per updated atom with `atom_id`, `arcade_id`, and `arcade_name`.
        - `log.before_game` and `log.after_game` are the same ids used in `from` and `to`.
        - If any atom id is missing, if any atom does not currently point at `current_game_version_series`, or if validation fails, update nothing and create no changelog row.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkUpdateArcadeGameVersionRequest'
      responses:
        '200':
          description: Bulk update applied and changelog created.
          content:
            application/json:
              schema:
                type: object
                required: [from, to, count, changelog]
                properties:
                  from:
                    type: string
                  to:
                    type: string
                  count:
                    type: integer
                  changelog:
                    type: string
                    description: Always `bulk_game_version`.
        '400':
          description: Invalid JSON or validation failure.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid bearer token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PocketBaseAuthError'
        '403':
          description: Moderator access required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Transaction or notification failure.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
