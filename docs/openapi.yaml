              example:
                arcade: arcade_123
                summary:
                  total: 2
                  success: 0
                  failed: 2
                uploaded: []
                failed:
                  - index: 0
                    filename: bad1.gif
                    reason: unsupported mime type - image/gif
                  - index: 1
                    filename: bad2.gif
                    reason: unsupported mime type - image/gif
                xp_feedback:
                  previous_exp: 0
                  new_exp: 0
                  diff_exp: 0
                  previous_percent_to_next_level: 0
                  new_percent_to_next_level: 0
                  previous_level: 0
                  new_level: 0
