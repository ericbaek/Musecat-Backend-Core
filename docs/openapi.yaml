              schema:
                type: object
                required: [flag, reaction, action, reaction_id, solved, game, xp_feedback]
                properties:
                  flag:
                    type: string
                  reaction:
                    type: string
                  action:
                    type: string
                  reaction_id:
                    type: string
                  solved:
                    type: boolean
                  game:
                    $ref: '#/components/schemas/ArcadeGameExpanded'
                  xp_feedback:
                    $ref: '#/components/schemas/XpFeedback'
        '400':
          description: Invalid body or reaction rule failure.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid bearer token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PocketBaseAuthError'
        '502':
          description: Auto-solve follow-up failed after a successful reaction write.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /user/signup:
    post:
      tags: [Users]
      summary: /user/signup
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignUpJsonRequest'
          multipart/form-data:
            schema:
              type: object
              required: [username]
              properties:
                username:
                  type: string
                  maxLength: 15
                nickname:
                  type: string
                bio:
                  type: string
                avatar:
                  type: string
                  format: binary
      responses:
        '200':
          description: Signup initialized.
          content:
            application/json:
              schema:
                type: object
                required: [success, profile]
                properties:
                  success:
                    type: boolean
                  profile:
                    $ref: '#/components/schemas/UserProfile'
        '400':
          description: Invalid body or validation failure.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid bearer token.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/PocketBaseAuthError'
                  - $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Withdrawn account cannot sign up.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Username or user_info already initialized, or username already taken.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Signup transaction failure.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /user/check-in:
    post:
      tags: [Users]
      summary: /user/check-in
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Check-in state and XP feedback.
          content:
            application/json:
              schema:
                type: object
                required: [checked_in, already_checked_in, gained_exp, exp, level, day, xp_feedback]
                properties:
                  checked_in:
                    type: boolean
                  already_checked_in:
                    type: boolean
                  gained_exp:
                    type: integer
                  exp:
                    type: integer
                  level:
                    type: integer
                  day:
                    type: string
                    description: KST date in `YYYY-MM-DD` format.
                  xp_feedback:
                    $ref: '#/components/schemas/XpFeedback'
        '401':
          description: Missing or invalid bearer token.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/PocketBaseAuthError'
                  - $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Withdrawn or banned user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Check-in transaction failure.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /arcade/visits:
    get:
      tags: [Arcades]
      summary: /arcade/visits
      parameters:
        - name: arcade
          in: query
          required: true
          schema: {type: string}
      responses:
        '200':
          description: Public aggregate visit counts for a public arcade.
          content:
            application/json:
              schema:
                type: object
                required: [arcade, total_visits, distinct_visitors]
                properties:
                  arcade: {type: string}
                  total_visits: {type: integer}
                  distinct_visitors: {type: integer}
  /arcade/visit:
    post:
      tags: [Arcade Mutations]
      summary: /arcade/visit
      security: [{bearerAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/ArcadeVisitRequest'}
      responses:
        '200':
          description: GPS visit verification result and XP feedback.
          content:
            application/json:
              schema:
                type: object
                properties:
                  visited: {type: boolean}
                  already_visited: {type: boolean}
                  visit: {$ref: '#/components/schemas/Visit'}
                  gained_exp: {type: integer}
                  exp: {type: integer}
                  level: {type: integer}
                  xp_feedback: {$ref: '#/components/schemas/XpFeedback'}
        '400': {description: Invalid coordinates or GPS accuracy.}
        '403': {description: Inactive user, ineligible arcade, or outside the 100m radius.}
        '409': {description: Missing arcade coordinates or timezone.}
  /user/visits:
    get:
      tags: [Users]
      summary: /user/visits
      security: [{bearerAuth: []}]
      responses:
        '200':
          description: Authenticated user's visit history and aggregate statistics.
          content:
            application/json:
              schema:
                type: object
                required: [visits, stats]
                properties:
                  visits: {type: array, items: {$ref: '#/components/schemas/Visit'}}
                  stats: {$ref: '#/components/schemas/VisitStats'}
  /user/visit-visibility:
    put:
      tags: [Users]
      summary: /user/visit-visibility
      security: [{bearerAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/VisitVisibilityRequest'}
      responses:
        '200':
          description: Updated public visit visibility.
  /user/withdraw:
    post:
      tags: [Users]
      summary: /user/withdraw
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WithdrawRequest'
      responses:
        '200':
          description: Account withdrawn successfully.
          content:
            application/json:
              schema:
                type: object
                required: [success, withdrawnAt]
                properties:
                  success:
                    type: boolean
                  withdrawnAt:
                    type: string
        '400':
          description: Invalid JSON or password missing for password accounts.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing auth or invalid password.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/PocketBaseAuthError'
                  - $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Account already withdrawn.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Withdraw transaction failure.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
