paths:
  /search:
    get:
      tags: [Search]
      summary: /search
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
          description: Case-insensitive search keyword.
        - $ref: '#/components/parameters/LimitQuery'
        - name: lat
          in: query
          schema:
            type: number
            format: double
          description: User latitude. Provide together with `lon` to boost nearby arcade results.
        - name: lon
          in: query
          schema:
            type: number
            format: double
          description: User longitude. Provide together with `lat` to boost nearby arcade results.
      responses:
        '200':
          description: Search results grouped by resource bucket.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResponse'
              example:
                users:
                  - username: searchhero
                    nickname: Alpha Nick
                    avatar: ""
                arcades:
                  - id: ubbeq9qzfck5s4w
                    country: KR
                    name: Search Palace
                    address: 101 Exact Road
                    nickname: [First Spot]
                    closed: false
                    distance_km: 0.4
        '400':
          description: Missing search query or invalid limit.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Upstream database lookup failure.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /arcade:
    get:
      tags: [Arcades]
      summary: /arcade
      description: |
        Returns relation ids by default.
        When `expand=game`, each `game.items[]` entry includes `version`, `series`, `uncertain`, `updated`, and, when `uncertain=true`, `prev_game`.
      parameters:
        - name: id
          in: query
          schema:
            type: string
          description: Arcade id.
        - name: arcade
          in: query
          schema:
            type: string
          description: Alias for `id`.
        - name: expand
          in: query
          schema:
            type: string
          description: |
            `none` or empty returns relation ids only. `all` expands every section.
            Comma-separated values such as `basic,hour` expand only the requested sections.
      responses:
        '200':
          description: Arcade metadata with relation ids or expanded relation payloads.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArcadeValueResponse'
              examples:
                idsOnly:
                  value:
                    admin:
                      id: arcade_123
                      public: true
                      closed: false
                      country: AU
                      timezone: Australia/Sydney
                      createdBy: user_123
                      created: "2026-04-01 12:00:00.000Z"
                      updated: "2026-04-10 09:00:00.000Z"
                    basic: basic_rel
                    hour: hour_rel
                    sns: sns_rel
                    gtk: gtk_rel
                    game: game_rel
                    photo: photo_rel
                expanded:
                  value:
                    admin:
                      id: arcade_123
                      public: true
                      closed: false
                      country: AU
                      timezone: Australia/Sydney
                      createdBy: user_123
                      created: "2026-04-01 12:00:00.000Z"
                      updated: "2026-04-10 09:00:00.000Z"
                    basic:
                      id: basic_rel
                      name: Sydney Arcade
                      address: 123 George St, Sydney NSW
                      direction: Level 2
                      nickname: [Town Hall]
                      subway_line: [T1]
                      location:
                        lat: -33.8708
                        lon: 151.2062
                    hour:
                      id: hour_rel
                      Monday:
                        start: 1000
                        end: 2300
                      Thursday:
                        start: 0
                        end: 0
                      Sunday: 499
                      Note: Late night on Thursdays
                    sns:
                      id: sns_rel
                      items:
                        - type: instagram
                          link: https://instagram.com/example
                          name: Official account
                    gtk:
                      id: gtk_rel
                      items:
                        - type: smoking
                          bool: false
                    game:
                      id: game_rel
                      items:
                        - id: atom_123
                          updated: "2026-04-10 09:00:00.000Z"
                          version:
                            id: version_123
                            series: series_123
                            released_on: "2025-01-01"
                            en: Version A
                            kr: Version A
                            jp: Version A
                            price_default: null
                          series:
                            id: series_123
                            seriesNumber: 1
                            en: Series A
                            kr: Series A
                            jp: Series A
                            en_short: A
                            kr_short: A
                            jp_short: A
                            manufacturer: null
                          uncertain: true
                          prev_game:
                            id: version_122
                            series: series_123
                            released_on: "2024-01-01"
                            en: Version Old
                            kr: Version Old
                            jp: Version Old
                            price_default: null
                          location: 2F
                          quantity: 1
                          price:
                            currency: KRW
                            type: custom
                            list:
                              - value: 500
                            accept: [Cash]
                          tag: []
                    photo:
                      id: photo_rel
        '400':
          description: Missing target arcade id.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Arcade not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /arcades:
    get:
      tags: [Arcades]
      summary: /arcades
      parameters:
        - name: public
          in: query
          schema:
            type: boolean
        - name: closed
          in: query
          schema:
            type: boolean
        - $ref: '#/components/parameters/CountryQuery'
      responses:
        '200':
          description: List of arcade summaries.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ArcadeSummary'
              example:
                - id: arcade_123
                  country: AU
                  name: Sydney Arcade
                  address: 123 George St, Sydney NSW
                  location:
                    lat: -33.8708
                    lon: 151.2062
                  game_series: [series_1, series_2]
        '400':
          description: Invalid boolean filter.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Database lookup failure.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /arcades/updates:
    get:
      tags: [Arcades]
      summary: /arcades/updates
      parameters:
        - $ref: '#/components/parameters/LimitQuery'
        - $ref: '#/components/parameters/CountryQuery'
      responses:
        '200':
          description: Latest update block per arcade, newest first.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ArcadeUpdateSummary'
              example:
                - id: arcade_123
                  country: AU
                  name: Sydney Arcade
                  address: 123 George St, Sydney NSW
                  location:
                    lat: -33.8708
                    lon: 151.2062
                  game_series: [series_1]
                  updated: "2026-04-10 09:00:00.000Z"
                  block_started_at: "2026-04-10 09:00:00.000Z"
                  block_ended_at: "2026-04-10 08:58:00.000Z"
                  updated_parts: [basic, hour, flag, flag_reaction]
                  changes:
                    - part: hour
                      by: user_123
                      created: "2026-04-10 09:00:00.000Z"
                    - part: flag
                      by: user_123
                      created: "2026-04-10 08:59:30.000Z"
                    - part: flag_reaction
                      by: user_123
                      created: "2026-04-10 08:59:00.000Z"
                    - part: basic
                      by: user_123
                      created: "2026-04-10 08:58:00.000Z"
        '400':
          description: Invalid limit.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Failed to build update list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /arcades/nearby:
    get:
      tags: [Arcades]
      summary: /arcades/nearby
      parameters:
        - name: game_series
          in: query
          description: Repeat the query param or pass comma-separated ids.
          schema:
            oneOf:
              - type: string
              - type: array
                items:
                  type: string
        - name: lat
          in: query
          required: true
          schema:
            type: number
            format: double
        - name: lon
          in: query
          required: true
          schema:
            type: number
            format: double
        - name: address
          in: query
          schema:
            type: string
          description: Normalized address keyword filter.
        - name: country
          in: query
          schema:
            type: string
          description: Optional ISO country-code filter.
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
        - name: distance_limit
          in: query
          description: Optional maximum distance in kilometers from the supplied location.
          schema:
            type: number
            format: double
            minimum: 0
