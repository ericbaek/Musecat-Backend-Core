openapi: 3.1.0
info:
  title: Delta-DB API
  version: 0.1.0
  summary: OpenAPI source of truth for the frontend-facing Delta-DB endpoints.
  description: |
    This spec covers the first documentation batch used by the self-hosted Stoplight Elements
    reference at `/docs/`.
servers:
  - url: http://localhost:8090
    description: Local development server
tags:
  - name: Meta
    description: Service metadata and helper endpoints.
  - name: Geo
    description: Country, timezone, and geocoding helper endpoints.
  - name: Search
    description: Public lookup endpoints for unified search.
  - name: Arcades
    description: Public arcade read endpoints.
  - name: Moderator
    description: Moderator-facing arcade and content review endpoints.
  - name: Support
    description: Supporter XP and request endpoints.
  - name: Users
    description: Public and authenticated user profile endpoints.
  - name: Arcade Mutations
    description: Authenticated arcade editing endpoints.
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    LimitQuery:
      name: limit
      in: query
      description: Positive integer limit. Endpoint-specific caps apply.
      schema:
        type: integer
        minimum: 1
    CountryQuery:
      name: country
      in: query
      description: Country code stored in `arcade.country`.
      schema:
        type: string
    UserIdQuery:
      name: id
      in: query
      description: Target record id.
      schema:
        type: string
    UsernameQuery:
      name: username
      in: query
      description: Target username.
      schema:
        type: string
  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
        details:
          type: string
        code:
          type: string
    PocketBaseAuthError:
      type: object
      required: [data, message, status]
      properties:
        data:
          type: object
          additionalProperties: true
        message:
          type: string
        status:
          type: integer
          example: 401
    Location:
      type: object
      required: [lat, lon]
      properties:
        lat:
          type: number
          format: double
        lon:
          type: number
          format: double
    XpFeedback:
      type: object
      required:
        - previous_exp
        - new_exp
        - diff_exp
        - previous_percent_to_next_level
        - new_percent_to_next_level
        - previous_level
        - new_level
        - level_diff
        - remaining_exp_to_next_level
        - remaining_percent_to_next_level
      properties:
        previous_exp:
          type: integer
        new_exp:
          type: integer
        diff_exp:
          type: integer
        previous_percent_to_next_level:
          type: integer
          description: Progress percentage before the change. Use `100 - remaining_percent_to_next_level` semantics.
        new_percent_to_next_level:
          type: integer
          description: Progress percentage after the change. Use `100 - remaining_percent_to_next_level` semantics.
        previous_level:
          type: integer
        new_level:
          type: integer
        level_diff:
          type: integer
        remaining_exp_to_next_level:
          type: integer
        remaining_percent_to_next_level:
          type: integer
          description: Percent remaining to the next level. Use `100 - remaining_percent_to_next_level` for progress fill.
    GeoLookupResponse:
      type: object
      required: [country, timezone]
      properties:
        country:
          type: string
        timezone:
          type: string
    GeocodeCandidate:
      type: object
      required: [address, lat, lon]
      properties:
        address:
          type: string
        road_address:
          type: string
        lat:
          type: number
          format: double
        lon:
          type: number
          format: double
        place_id:
          type: string
    GeocodeResponse:
      type: object
      required: [provider, query, results]
      properties:
        provider:
          type: string
          enum: [google, kakao, osm]
        query:
          type: string
        results:
          type: array
          items:
            $ref: '#/components/schemas/GeocodeCandidate'
    ReverseGeocodeResponse:
      type: object
      required: [provider, lat, lon, address, display_name]
      properties:
        provider:
          type: string
          enum: [google, kakao, osm]
        lat:
          type: number
          format: double
        lon:
          type: number
          format: double
        address:
          type: string
        road_address:
          type: string
        display_name:
          type: string
        place_id:
          type: string
    StatsResponse:
      type: object
      required: [arcade_count, changelog_count, flag_count]
      properties:
        arcade_count:
          type: integer
          format: int64
        changelog_count:
          type: integer
          format: int64
        flag_count:
          type: integer
          format: int64
    RankingProfile:
      type: object
      required: [id, nickname, username, avatar, level, tags]
      properties:
        id: {type: string}
        nickname: {type: string}
        username: {type: string}
        avatar: {type: string}
        level: {type: integer}
        tags:
          type: array
          items: {type: string}
    RankingEntry:
      type: object
      required: [rank, score, profile]
      properties:
        rank: {type: integer}
        score: {type: integer, format: int64}
        profile: {$ref: '#/components/schemas/RankingProfile'}
    RankingResponse:
      type: object
      required: [metric, period, entries]
      properties:
        metric: {type: string, enum: [explorer, visits, xp, level, photographer]}
        period: {type: string, enum: [week, month, half_year, year, all]}
        entries:
          type: array
          items: {$ref: '#/components/schemas/RankingEntry'}
    SearchUserItem:
      type: object
      required: [username, nickname, avatar]
      properties:
        username:
          type: string
        nickname:
          type: string
        avatar:
          type: string
          description: Avatar filename only.
    SearchArcadeItem:
      type: object
      required: [id, country, name, address, nickname, closed]
      properties:
        id:
          type: string
        country:
          type: string
        name:
          type: string
        address:
          type: string
        nickname:
          type: array
          items:
            type: string
        closed:
          type: boolean
        distance_km:
          type: number
          format: double
          description: Distance from the supplied user location in kilometers.
    SearchResponse:
      type: object
      required: [users, arcades]
      properties:
        users:
          type: array
          items:
            $ref: '#/components/schemas/SearchUserItem'
        arcades:
          type: array
          items:
            $ref: '#/components/schemas/SearchArcadeItem'
    ArcadeSummary:
      type: object
      required: [id, country, game_series]
      properties:
        id:
          type: string
        country:
          type: string
        name:
          type: string
        address:
          type: string
        location:
          $ref: '#/components/schemas/Location'
        game_series:
          type: array
          items:
            type: string
    ArcadeAdminSummary:
      type: object
      required: [id, public, closed, country, timezone, createdBy, created, updated]
      properties:
        id:
          type: string
        public:
          type: boolean
        closed:
          type: boolean
        country:
          type: string
        timezone:
          type: string
        createdBy:
          type: string
        created:
          type: string
        updated:
          type: string
    ArcadeBasicExpanded:
      type: object
      required: [id, name, address, direction, nickname, subway_line, location]
      properties:
        id:
          type: string
        name:
          type: string
        address:
          type: string
        direction:
          type: string
        nickname:
          type: array
          items:
            type: string
        subway_line:
          type: array
          items:
            type: string
        location:
          $ref: '#/components/schemas/Location'
    DayHoursObject:
      type: object
      required: [start, end]
      properties:
        start:
          type: integer
          minimum: 0
          maximum: 2359
          description: HHMM integer.
        end:
          type: integer
          minimum: 0
          maximum: 2400
          description: HHMM integer. `2400` is only valid for 24-hour operation.
    DayHoursValue:
      oneOf:
        - $ref: '#/components/schemas/DayHoursObject'
        - type: integer
          const: 499
          description: Closed marker.
        - type: 'null'
          description: Unknown or unset.
      description: |
        Weekly opening hours value. Use `499` for closed, `null` for unknown, or an object with
        `start` and `end` HHMM values.
    ArcadeHourExpanded:
      type: object
      required: [id]
      properties:
        id:
          type: string
        Monday:
          $ref: '#/components/schemas/DayHoursValue'
        Tuesday:
          $ref: '#/components/schemas/DayHoursValue'
        Wednesday:
          $ref: '#/components/schemas/DayHoursValue'
        Thursday:
          $ref: '#/components/schemas/DayHoursValue'
        Friday:
          $ref: '#/components/schemas/DayHoursValue'
        Saturday:
          $ref: '#/components/schemas/DayHoursValue'
        Sunday:
          $ref: '#/components/schemas/DayHoursValue'
        Note:
          type: string
    ArcadeSnsItem:
      type: object
      required: [type, link]
      properties:
        type:
          type: string
        link:
          type: string
        name:
          type: string
    ArcadeSnsExpanded:
      type: object
      required: [id, items]
      properties:
        id:
          type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/ArcadeSnsItem'
    ArcadeGtkItem:
      type: object
      required: [type, bool]
      properties:
        type:
          type: string
        bool:
          type: boolean
        note:
          type: string
        meta:
          $ref: '#/components/schemas/ParkingMeta'
    ArcadeGtkExpanded:
      type: object
      required: [id, items]
      properties:
        id:
          type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/ArcadeGtkItem'
    ParkingGeo:
      type: object
      required: [lat, lon]
      properties:
        lat:
          type: number
        lon:
          type: number
    ParkingMeta:
      type: object
      additionalProperties: false
      properties:
        geo:
          $ref: '#/components/schemas/ParkingGeo'
        availability:
          type: string
          enum: [always_plenty, somewhat_plenty, somewhat_difficult, difficult]
        options:
          type: array
          items:
            type: string
            enum: [free_parking_lot, paid_parking_lot, free_street_parking, paid_street_parking]
        ev_charging:
          type: boolean
        gov_parking:
          type: boolean
    ArcadeFlagReaction:
      type: object
      required: [id, reaction, createdBy, created, updated]
      properties:
        id:
          type: string
        reaction:
          type: string
        createdBy:
          type: string
        created:
          type: string
        updated:
          type: string
    ArcadeFlagExpanded:
      type: object
      required: [id, arcade, disruption, solved, message, photos, createdBy, created, updated, reactions]
      description: Open flag payload returned under game items or orphan flag lists.
      properties:
        id:
          type: string
        arcade:
          type: string
        disruption:
          type: string
        solved:
          type: boolean
        message:
          type: string
        photos:
          type: array
          items:
            type: string
        createdBy:
          type: string
        created:
          type: string
        updated:
          type: string
        reactions:
          type: array
          items:
            $ref: '#/components/schemas/ArcadeFlagReaction'
    ArcadeGameArcade:
      type: object
      required: [id, country, name, address, location]
      properties:
        id:
          type: string
        country:
          type: string
        name:
          type: string
        address:
          type: string
        location:
          $ref: '#/components/schemas/Location'
    ArcadeGameVersion:
      type: object
      required: [id, series, released_on, en, kr, jp, price_default]
      properties:
        id:
          type: string
        series:
          oneOf:
            - type: string
            - type: 'null'
        released_on:
          oneOf:
            - type: string
            - type: 'null'
        en:
          type: string
        kr:
          type: string
        jp:
          type: string
        price_default:
          oneOf:
            - type: object
              additionalProperties: true
            - type: string
            - type: integer
            - type: number
            - type: 'null'
    ArcadeGameItem:
      type: object
      additionalProperties: true
      required: [id, updated]
      properties:
        arcade:
          oneOf:
            - $ref: '#/components/schemas/ArcadeGameArcade'
            - type: 'null'
        game:
          type: string
        version:
          oneOf:
            - $ref: '#/components/schemas/ArcadeGameVersion'
            - type: 'null'
        uncertain:
          type: boolean
        prev_game:
          oneOf:
            - $ref: '#/components/schemas/ArcadeGameVersion'
            - type: 'null'
        series:
          oneOf:
            - type: object
              additionalProperties: true
            - type: 'null'
        location:
          type: string
        quantity:
          type: integer
        price:
          oneOf:
            - type: object
              additionalProperties: true
            - type: string
            - type: integer
            - type: number
            - type: 'null'
        tag:
          type: array
          items:
            type: object
            additionalProperties: true
        id:
          type: string
        updated:
          type: string
          description: Last time this specific game atom was confirmed or edited.
        flags:
          type: array
          items:
            $ref: '#/components/schemas/ArcadeFlagExpanded'
    ArcadeGameInformationConfirmResponse:
      type: object
      required: [arcade, game, atom, updated]
      properties:
        arcade:
          type: string
        game:
          type: string
        atom:
          type: string
        updated:
          type: string
    ArcadeGameExpanded:
      type: object
      required: [id, items]
      properties:
        id:
          type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/ArcadeGameItem'
        orphanFlags:
          type: array
          items:
            $ref: '#/components/schemas/ArcadeFlagExpanded'
    ArcadePhotoExpanded:
      type: object
      additionalProperties: true
      description: Expanded photo molecule payload.
    ArcadeBasicValue:
      oneOf:
        - type: string
        - type: 'null'
        - $ref: '#/components/schemas/ArcadeBasicExpanded'
    ArcadeHourValue:
      oneOf:
        - type: string
        - type: 'null'
        - $ref: '#/components/schemas/ArcadeHourExpanded'
    ArcadeSnsValue:
      oneOf:
        - type: string
        - type: 'null'
        - $ref: '#/components/schemas/ArcadeSnsExpanded'
    ArcadeGtkValue:
      oneOf:
        - type: string
        - type: 'null'
        - $ref: '#/components/schemas/ArcadeGtkExpanded'
    ArcadeGameValue:
      oneOf:
        - type: string
        - type: 'null'
        - $ref: '#/components/schemas/ArcadeGameExpanded'
    ArcadePhotoValue:
      oneOf:
        - type: string
        - type: 'null'
        - $ref: '#/components/schemas/ArcadePhotoExpanded'
    ArcadeValueResponse:
      type: object
      required: [admin, basic, hour, sns, gtk, game, photo]
      properties:
        admin:
          $ref: '#/components/schemas/ArcadeAdminSummary'
        basic:
          $ref: '#/components/schemas/ArcadeBasicValue'
        hour:
          $ref: '#/components/schemas/ArcadeHourValue'
        sns:
          $ref: '#/components/schemas/ArcadeSnsValue'
        gtk:
          $ref: '#/components/schemas/ArcadeGtkValue'
        game:
          $ref: '#/components/schemas/ArcadeGameValue'
        photo:
          $ref: '#/components/schemas/ArcadePhotoValue'
    ArcadeUpdateChange:
      type: object
      required: [part, by, created]
      properties:
        part:
          type: string
        by:
          type: string
        created:
          type: string
    ArcadeUpdateSummary:
      allOf:
        - $ref: '#/components/schemas/ArcadeSummary'
        - type: object
          required: [updated, block_started_at, block_ended_at, changes, updated_parts]
          properties:
            updated:
              type: string
            block_started_at:
              type: string
            block_ended_at:
              type: string
            changes:
              type: array
              items:
                $ref: '#/components/schemas/ArcadeUpdateChange'
            updated_parts:
              type: array
              description: Ordered list of arcade parts changed in the grouped block.
              items:
                type: string
                enum: [basic, hour, sns, gtk, game, bulk_game_version, photo, flag, flag_reaction]
    ArcadesNearbyResponse:
      type: object
      required: [page, per_page, last_page, total, country_totals, items]
      properties:
        page:
          type: integer
        per_page:
          type: integer
        last_page:
          type: integer
        total:
          type: integer
        country_totals:
          type: object
          additionalProperties:
            type: object
            required: [total, nearest_arcade]
            properties:
              total:
                type: integer
              nearest_arcade:
                type: object
                required: [id, distance_km]
                properties:
                  id:
                    type: string
                  distance_km:
                    type: number
                    format: double
        items:
          type: array
          items:
            allOf:
              - $ref: '#/components/schemas/ArcadeSummary'
              - type: object
                required: [distance_km]
                properties:
                  distance_km:
                    type: number
                    format: double
                  game:
                    $ref: '#/components/schemas/ArcadeGameValue'
    UserProfileSnsItem:
      type: object
      required: [type, link]
      properties:
        type:
          type: string
        link:
          type: string
        name:
          type: string
    UserProfileSns:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/UserProfileSnsItem'
    UserProfileSeries:
      type: object
      required: [id, seriesNumber, en, kr, jp, en_short, kr_short, jp_short, manufacturer]
      properties:
        id:
          type: string
        seriesNumber:
          oneOf:
            - type: integer
            - type: string
            - type: 'null'
        en:
          type: string
        kr:
          type: string
        jp:
          type: string
        en_short:
          type: string
        kr_short:
          type: string
        jp_short:
          type: string
        manufacturer:
          oneOf:
            - type: string
            - type: object
              additionalProperties: true
            - type: 'null'
    UserProfile:
      type: object
      required:
        - id
        - created
        - username
        - nickname
        - bio
        - avatar
        - background
        - tag
        - sns
        - withdrawn
        - series_public
        - level
      properties:
        id:
          type: string
        created:
          type: string
        username:
          type: string
          maxLength: 15
        nickname:
          type: string
        bio:
          type: string
        avatar:
          type: string
        background:
          type: string
        tag:
          type: array
          items:
            type: string
        owns:
          type: array
          description: Authenticated user's managed arcade IDs. Included only by GET /user/me.
          items:
            type: string
        sns:
          $ref: '#/components/schemas/UserProfileSns'
        withdrawn:
          type: boolean
        series_public:
          type: boolean
        warp:
          type:
            - boolean
            - 'null'
        level:
          type: integer
        series:
          type: array
          items:
            $ref: '#/components/schemas/UserProfileSeries'
        visit_visibility:
          type: string
          enum: [private, summary, full]
        visit_stats:
          $ref: '#/components/schemas/VisitStats'
        visits:
          type: array
          items:
            $ref: '#/components/schemas/Visit'
    Visit:
      type: object
      required: [id, arcade, visit_day, visited_at, distance_meters, accuracy_meters, gained_exp]
      properties:
        id: {type: string}
        arcade: {type: string}
        visit_day: {type: string, format: date}
        visited_at: {type: string}
        distance_meters: {type: number}
        accuracy_meters: {type: number}
        gained_exp: {type: integer}
    VisitStats:
      type: object
      required: [total_visits, distinct_arcades, arcades]
      properties:
        total_visits: {type: integer}
        distinct_arcades: {type: integer}
        last_visited_at: {type: string}
        arcades:
          type: array
          description: Per-arcade visit totals. Exposed in public summary and full profiles.
          items:
            type: object
            required: [arcade, visit_count, last_visited_at]
            properties:
              arcade: {type: string}
              visit_count: {type: integer}
              last_visited_at: {type: string}
    ArcadeVisitRequest:
      type: object
      required: [arcade, lat, lon, accuracy]
      properties:
        arcade: {type: string}
        lat: {type: number}
        lon: {type: number}
        accuracy: {type: number, description: GPS accuracy in meters; must be at most 100.}
    VisitVisibilityRequest:
      type: object
      required: [visit_visibility]
      properties:
        visit_visibility: {type: string, enum: [private, summary, full]}
    UserActivityRange:
      type: object
      required: [start_date, end_date, tz, days]
      properties:
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
        tz:
          type: string
        days:
          type: integer
    UserActivityTotals:
      type: object
      required: [total_count, changelog_count, flag_count, legacy_ticket_count, attendance_count, max_daily_count]
      properties:
        total_count:
          type: integer
        changelog_count:
          type: integer
        flag_count:
          type: integer
        legacy_ticket_count:
          type: integer
        attendance_count:
          type: integer
        max_daily_count:
          type: integer
    UserActivityDay:
      type: object
      required: [date, total_count, level, changelog_count, flag_count, legacy_ticket_count, attendance_count]
      properties:
        date:
          type: string
          format: date
        total_count:
          type: integer
        level:
          type: integer
          minimum: 0
          maximum: 4
        changelog_count:
          type: integer
        flag_count:
          type: integer
        legacy_ticket_count:
          type: integer
        attendance_count:
          type: integer
    UserActivityResponse:
      type: object
      required: [user, range, totals, days]
      properties:
        user:
          $ref: '#/components/schemas/UserProfile'
        range:
          $ref: '#/components/schemas/UserActivityRange'
        totals:
          $ref: '#/components/schemas/UserActivityTotals'
        days:
          type: array
          items:
            $ref: '#/components/schemas/UserActivityDay'
    SupporterLedgerDetail:
      type: object
      additionalProperties: true
    SupporterLedgerEntry:
      type: object
      required: [id, kind, source, action, exp, previous_exp, new_exp, created]
      properties:
        id:
          type: string
        kind:
          type: string
          description: Exact user_level_log.kind value.
        source:
          type: string
          enum: [arcade, visit, flag, flag_reaction, attendance, other]
        action:
          type: string
        exp:
          type: integer
        previous_exp:
          type: integer
        new_exp:
          type: integer
        created:
          type: string
        arcade_id:
          type: string
        arcade_name:
          type: string
        target_id:
          type: string
        target_name:
          type: string
        detail:
          $ref: '#/components/schemas/SupporterLedgerDetail'
    SupporterLatestRequest:
      type: object
      required: [id, status, exp_total, qualified, created]
      properties:
        id:
          type: string
        status:
          type: string
        exp_total:
          type: integer
        qualified:
          type: boolean
        created:
          type: string
        decision_reason:
          type: string
    SupporterScoreResponse:
      type: object
      required: [total_exp, attendance_exp, qualified, threshold, can_request, entries]
      properties:
        total_exp:
          type: integer
        attendance_exp:
          type: integer
        qualified:
          type: boolean
        threshold:
          type: integer
        can_request:
          type: boolean
        entries:
          type: array
          items:
            $ref: '#/components/schemas/SupporterLedgerEntry'
        latest_request:
          oneOf:
            - $ref: '#/components/schemas/SupporterLatestRequest'
            - type: 'null'
    CreateSupporterRequestResponse:
      type: object
