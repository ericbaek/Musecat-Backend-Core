        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [arcade, photos]
              properties:
                arcade:
                  type: string
                photos:
                  type: array
                  minItems: 1
                  maxItems: 10
                  items:
                    type: string
                    format: binary
            encoding:
              photos:
                style: form
                explode: true
      responses:
        '200':
          description: All files uploaded successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArcadePhotoUploadResponse'
              example:
                arcade: arcade_123
                summary:
                  total: 2
                  success: 2
                  failed: 0
                uploaded:
                  - index: 0
                    atomId: atom_1
                    filename: ok.png
                  - index: 1
                    atomId: atom_2
                    filename: ok2.jpg
                failed: []
                xp_feedback:
                  previous_exp: 0
                  new_exp: 5
                  diff_exp: 5
                  previous_percent_to_next_level: 0
                  new_percent_to_next_level: 25
                  previous_level: 0
                  new_level: 1
                  level_diff: 1
                  remaining_exp_to_next_level: 3
                  remaining_percent_to_next_level: 75
        '207':
          description: Partial success.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArcadePhotoUploadResponse'
              example:
                arcade: arcade_123
                summary:
                  total: 2
                  success: 1
                  failed: 1
                uploaded:
                  - index: 0
                    atomId: atom_1
                    filename: ok.png
                failed:
                  - index: 1
                    filename: bad.gif
                    reason: unsupported mime type - image/gif
                xp_feedback:
                  previous_exp: 0
                  new_exp: 5
                  diff_exp: 5
                  previous_percent_to_next_level: 0
                  new_percent_to_next_level: 25
                  previous_level: 0
                  new_level: 1
                  level_diff: 1
                  remaining_exp_to_next_level: 3
                  remaining_percent_to_next_level: 75
        '400':
          description: Invalid multipart body or validation failure.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid bearer token.
          content:
            application/json:
